plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.tma24.keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.tma24.keyboard"

        // minSdk 26 = Android 8.0 — covers your Android 11 device
        // and 95%+ of active Android devices
        minSdk 26
        targetSdk 34

        versionCode 1
        versionName "1.0.0"

        // Needed for ML Kit text recognition
        vectorDrawables.useSupportLibrary = true
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            minifyEnabled false
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                         'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
    }

    // Exclude duplicate META-INF files that ML Kit brings in
    packagingOptions {
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
    }
}

dependencies {

    // ── AndroidX Core ────────────────────────────────────────────────
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'

    // ── Material Design 3 ────────────────────────────────────────────
    implementation 'com.google.android.material:material:1.11.0'

    // ── ML Kit — Text Recognition (OCR) ─────────────────────────────
    // On-device, no internet required, works fully offline
    implementation 'com.google.mlkit:text-recognition:16.0.0'
    // Latin script (English) recogniser
    implementation 'com.google.mlkit:text-recognition-latin:16.0.0'

    // ── GIF support (for GIF keyboard panel) ─────────────────────────
    // Lightweight, no Google Play Services dependency
    implementation 'pl.droidsonroids.gif:android-gif-drawable:1.2.28'

    // ── Coroutines (for background clipboard / OCR work) ─────────────
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'

    // ── Lifecycle (for coroutine scope tied to IME lifecycle) ─────────
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-service:2.7.0'

    // ── Preferences (Settings screen) ────────────────────────────────
    implementation 'androidx.preference:preference-ktx:1.2.1'

    // ── ViewPager2 (for emoji / GIF / sticker tab layout) ────────────
    implementation 'androidx.viewpager2:viewpager2:1.0.0'

    // ── EmojiCompat (renders emoji correctly on all Android versions) ─
    implementation 'androidx.emoji2:emoji2:1.4.0'
    implementation 'androidx.emoji2:emoji2-views:1.4.0'

}