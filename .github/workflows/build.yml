name: Build T-mA24 Keyboard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Bootstrap Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
            -o /tmp/gradle-8.4-bin.zip
          unzip -j /tmp/gradle-8.4-bin.zip \
            "gradle-8.4/lib/gradle-wrapper-*.jar" \
            -d gradle/wrapper/ 2>/dev/null || true
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -fsSL \
              "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.4/gradle-wrapper-8.4.jar" \
              -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          fi
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            wget -q \
              "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -O gradle/wrapper/gradle-wrapper.jar
          fi
          echo "Wrapper jar size: $(du -sh gradle/wrapper/gradle-wrapper.jar)"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build debug APK
        run: >-
          ./gradlew :app:assembleDebug
          --no-daemon
          --stacktrace
          -Dkotlin.daemon.jvm.options="-Xmx2g -Xms512m"
          -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
          -Dorg.gradle.workers.max=2
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Verify APK was produced
        run: |
          echo "====== Searching for APK files ======"
          find "$GITHUB_WORKSPACE" -type f -name "*.apk" 2>/dev/null
          echo "====== app/build/outputs directory ======"
          find "$GITHUB_WORKSPACE/app/build/outputs" -type f 2>/dev/null || echo "app/build/outputs not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TMA24Keyboard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/outputs/logs/
          retention-days: 7

      - name: Print APK info
        if: success()
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "APK found at: $APK"
            echo "APK size: $(du -sh "$APK" | cut -f1)"
          else
            echo "APK not found at expected path"
            find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || echo "No APK found anywhere"
          fi
